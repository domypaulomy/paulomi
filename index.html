<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pau Lomi Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin: auto;
        }

        .badge {
            background-color: #334155;
            color: #38bdf8;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid #475569;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-info {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .btn-cta {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            margin-bottom: 1.5rem;
        }

        .btn-cta:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        /* Tombol Saran Baru */
        .btn-feedback {
            display: inline-block;
            background-color: transparent;
            color: #f5a623;
            border: 1px solid rgba(245, 166, 35, 0.4);
            text-decoration: none;
            padding: 0.7rem 1.8rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 3rem;
        }

        .btn-feedback:hover {
            background-color: rgba(245, 166, 35, 0.1);
            border-color: #f5a623;
            transform: translateY(-2px);
        }

        .links-section {
            border-top: 1px solid #334155;
            padding-top: 2rem;
            width: 100%;
        }

        .links-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 1.2rem;
        }

        /* Modifikasi Grup Link Menjadi Satu Baris Bersandingan */
        .links-group {
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        .ext-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.2s ease;
            display: inline-block;
            padding: 0.25rem 0.5rem;
        }

        .ext-link:hover {
            color: #38bdf8;
        }

        footer {
            text-align: center;
            color: #475569;
            font-size: 0.875rem;
            margin-top: 2rem;
            line-height: 1.5;
            width: 100%;
        }

        footer strong {
            color: #64748b;
        }

        /* STYLE POP-UP FORM (MODAL BOX) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #1e293b;
            border: 1px solid #334155;
            width: 100%;
            max-width: 440px;
            border-radius: 12px;
            padding: 2rem;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: left;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem; right: 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: none; color: #94a3b8;
            width: 30px; height: 30px; border-radius: 50%;
            font-size: 1.25rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f8fafc;
        }

        .modal-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 0.35rem;
        }

        .modal-desc {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            border-color: #38bdf8;
        }

        textarea.form-control {
            resize: none;
            height: 100px;
        }

        .btn-submit-modal {
            width: 100%;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 0.8rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-submit-modal:hover {
            background-color: #1d4ed8;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .status-info { font-size: 1rem; }
            .links-group { gap: 1rem; }
            .ext-link { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Pau Lomi Profile</div>
        <h1>Pau Lomi Profile</h1>
        <p class="status-info">Sistem masih dalam Pengembangan</p>
        
        <a href="https://s.id/chat-dlomy" class="btn-cta" target="_blank" rel="noopener noreferrer">
            Hubungi Saya
        </a>
        
        <br>
        
        <button id="openFeedbackBtn" class="btn-feedback">
            ✍️ Saran & Masukan
        </button>
        
        <div class="links-section">
            <p class="links-title">Kunjungi Juga Website</p>
            <div class="links-group">
                <a href="https://caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    Caelum Gladio
                </a>
                <a href="https://akademi.caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    CG Akademi
                </a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-content">
            <button class="modal-close" id="closeFeedbackBtn">&times;</button>
            <div class="modal-title">Saran & Masukan</div>
            <div class="modal-desc">Kritik, saran, atau ide fitur Anda akan terkirim secara instan langsung ke tim pengembang.</div>
            
            <form id="feedbackForm" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="729bde53-2b60-43d2-9d81-de6076f480f5">
                <input type="hidden" name="subject" value="Saran Baru Masuk dari Landing Page Domypaulomy">
                <input type="hidden" name="from_name" value="Kotak Masukan Profil Utama">

                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" name="nama_user" class="form-control" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Alamat Email</label>
                    <input type="email" name="email_user" class="form-control" placeholder="nama@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Saran / Masukan</label>
                    <textarea name="pesan_user" class="form-control" placeholder="Tulis kritik atau saran Anda di sini..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit-modal" id="submitFeedbackBtn">🚀 Kirim Masukan</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; paulomi - 2026. Oleh <strong>Domy Lomy</strong></p>
    </footer>

    <script>
        // Logika Interaksi Buka Tutup Jendela Pop-up (Modal)
        const modalOverlay = document.getElementById("feedbackModal");
        const openModalBtn = document.getElementById("openFeedbackBtn");
        const closeModalBtn = document.getElementById("closeFeedbackBtn");

        openModalBtn.addEventListener("click", () => {
            modalOverlay.classList.add("active");
        });

        closeModalBtn.addEventListener("click", () => {
            modalOverlay.classList.remove("active");
        });

        // Tutup otomatis saat user klik di luar kotak abu-abu
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove("active");
            }
        });

        // Proses Pengiriman Form via AJAX (Latar Belakang tanpa refresh halaman)
        document.getElementById("feedbackForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const form = this;
            const submitBtn = document.getElementById("submitFeedbackBtn");

            submitBtn.innerText = "Sedang Mengirim...";
            submitBtn.disabled = true;

            fetch(form.action, {
                method: form.method,
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    alert("Terima kasih, Pak Domy! Saran dan masukan berhasil dikirim masuk ke email Anda.");
                    form.reset();
                    modalOverlay.classList.remove("active");
                } else {
                    alert("Gagal mengirim, periksa token pengiriman Anda.");
                }
            })
            .catch(() => {
                alert("Terjadi kendala koneksi jaringan internet Anda.");
            })
            .finally(() => {
                submitBtn.innerText = "🚀 Kirim Masukan";
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
