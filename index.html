<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Landing Page - Pau Lomi</title>
    <!-- Favicon / Ikon Tab Browser -->
    <!-- Favicon / Ikon Tab Browser -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/external-flatart-icons-flat-flatarticons/64/external-coding-web-development-flatart-icons-flat-flatarticons.png">
    <!-- FontAwesome untuk Icon Keren -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0f1d;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            margin: auto;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
            position: relative;
        }

        .badge {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(129, 140, 248, 0.1));
            color: #38bdf8;
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge i {
            font-size: 0.75rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-info {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .btn-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 2.2rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.3);
            margin-bottom: 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(22, 163, 74, 0.5);
            filter: brightness(1.1);
        }

        .links-section {
            border-top: 1px solid rgba(148, 163, 184, 0.12);
            padding-top: 2.5rem;
            width: 100%;
        }

        .links-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #64748b;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        /* --- Perubahan Baris Tombol Horizontal --- */
        .links-group-horizontal {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .ext-link {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem 1rem;
            border-radius: 14px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.25s ease;
            text-align: center;
            gap: 0.5rem;
        }

        .ext-link i.icon-center {
            font-size: 1.5rem;
        }

        .ext-link small {
            color: #64748b;
            font-size: 0.75rem;
            font-weight: 400;
            display: block;
            margin-top: 0.2rem;
        }

        .icon-company { color: #38bdf8; }
        .icon-academy { color: #a78bfa; }

        .ext-link:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(56, 189, 248, 0.3);
            color: #ffffff;
            transform: translateY(-2px);
        }

        /* --- Tombol Pemicu PopUp Saran --- */
        .btn-saran {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.25);
            padding: 1rem;
            border-radius: 12px;
            color: #38bdf8;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-saran:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.25);
        }

        /* --- Desain Keren Jendela PopUp --- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 29, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-box {
            background: #141c2f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 420px;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.85);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .popup-overlay.active .popup-box {
            transform: scale(1);
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .popup-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .popup-title i { color: #38bdf8; }

        .btn-close {
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-close:hover { color: #f1f5f9; }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #ffffff;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }

        textarea.form-control {
            resize: none;
            height: 100px;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            border: none;
            padding: 0.85rem;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            filter: brightness(1.1);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
            transform: translateY(-1px);
        }

        footer {
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            margin-top: 3rem;
            line-height: 1.5;
            width: 100%;
            z-index: 2;
            position: relative;
        }

        footer strong {
            color: #64748b;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 2rem 1.25rem; }
            .btn-cta { width: 100%; justify-content: center; }
            .links-group-horizontal { flex-direction: column; gap: 0.75rem; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="badge">
            <i class="fa-solid fa-circle"></i> Demo Landing Page
        </div>
        
        <h1>Pau Lomi</h1>
        <p class="status-info">Sistem masih dalam Pengembangan</p>
        
        <a href="https://s.id/chat-dlomy" class="btn-cta" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-whatsapp fa-xl"></i> Hubungi Saya
        </a>
        
        <div class="links-section">
            <p class="links-title">Kunjungi Juga Website</p>
            
            <!-- Tombol Caelum Gladio & CG Akademi Sejajar Horizontal -->
            <div class="links-group-horizontal">
                <a href="https://caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-building icon-center icon-company"></i>
                    <span>Caelum Gladio <small>Company Profile</small></span>
                </a>
                
                <a href="https://akademi.caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-graduation-cap icon-center icon-academy"></i>
                    <span>CG Akademi <small>Media Belajar Resmi</small></span>
                </a>
            </div>

            <!-- Tombol Baru Untuk Memicu PopUp Masukan di Bawahnya -->
            <button class="btn-saran" onclick="openPopup()">
                <i class="fa-solid fa-comment-dots"></i> Kirim Saran / Masukan
            </button>
        </div>
    </div>

    <!-- Struktur Struktur Jendela PopUp -->
    <div class="popup-overlay" id="saranPopup" onclick="closePopupOutside(event)">
        <div class="popup-box">
            <div class="popup-header">
                <div class="popup-title">
                    <i class="fa-solid fa-pen-to-square"></i> Kotak Saran
                </div>
                <button class="btn-close" onclick="closePopup()">&times;</button>
            </div>
            <!-- Formulir Kirim Saran ke Email via Web3Forms -->
            <!-- Formulir Kirim Saran ke Email via Web3Forms -->
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <!-- MASUKKAN ACCESS KEY WEB3FORMS ANDA DI SINI -->
                <input type="hidden" name="access_key" value="729bde53-2b60-43d2-9d81-de6076f480f5">
                
                <!-- Pengaturan Tambahan agar Setelah Kirim Tidak Pindah Halaman -->
                <input type="hidden" name="redirect" value="https://domypaulomy.github.io/catetin">
                <input type="hidden" name="from_name" value="Kotak Saran Catetin">

                <!-- Input Nama (Wajib) -->
                <div class="form-group">
                    <label for="nama">Nama Pengirim</label>
                    <input type="text" id="nama" name="Nama Pengirim" class="form-control" placeholder="Nama Anda..." required>
                </div>

                <!-- Input Email Baru (Wajib) -->
                <div class="form-group">
                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" name="Email Pengirim" class="form-control" placeholder="nama@email.com..." required>
                </div>

                <!-- Input Saran/Masukan (Wajib) -->
                <div class="form-group">
                    <label for="pesan">Saran & Masukan</label>
                    <textarea id="pesan" name="Pesan Saran" class="form-control" placeholder="Tulis masukan di sini..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Kirim Sekarang
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; paulomi - 2026. Oleh <strong>Domy Lomy</strong></p>
    </footer>

    <script>
        // --- Kontrol Mekanisme PopUp ---
        function openPopup() {
            document.getElementById('saranPopup').classList.add('active');
        }

        function closePopup() {
            document.getElementById('saranPopup').classList.remove('active');
        }

        function closePopupOutside(event) {
            if (event.target.classList.contains('popup-overlay')) {
                closePopup();
            }
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            const nama = document.getElementById('nama').value;
            const pesan = document.getElementById('pesan').value;
            
            alert(`Terima kasih banyak ${nama}! Saran Anda berhasil dikirim.`);
            
            // Reset input form & tutup popup
            document.getElementById('nama').value = '';
            document.getElementById('pesan').value = '';
            closePopup();
        }

        // --- Efek Coding Background Animation (Tetap Dipertahankan) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const codeChars = "01<>[]{}/\\=+*htmlcssjavascriptpaulomicaelumgladio2026_";
        const charArray = codeChars.split("");

        const fontSize = 14;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100;
        }

        function drawBackground() {
            ctx.fillStyle = 'rgba(10, 15, 29, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#38bdf8';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawBackground, 33);
    </script>
</body>
</html>
