<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Landing Page - Pau Lomi</title>
    <!-- Favicon / Ikon Tab Browser -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/external-flatart-icons-flat-flatarticons/64/external-coding-web-development-flatart-icons-flat-flatarticons.png">
    <!-- FontAwesome untuk Icon Keren -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0f1d;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            margin: auto;
            background: rgba(30, 41, 59, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
            position: relative;
        }

        .badge {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1), rgba(129, 140, 248, 0.1));
            color: #38bdf8;
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge i {
            font-size: 0.75rem;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-info {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .btn-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 2.2rem;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.3);
            margin-bottom: 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(22, 163, 74, 0.5);
            filter: brightness(1.1);
        }

        .links-section {
            border-top: 1px solid rgba(148, 163, 184, 0.12);
            padding-top: 2.5rem;
            width: 100%;
        }

        .links-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #64748b;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ext-link {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.25s ease;
            text-align: left;
        }

        .ext-link i.icon-left {
            font-size: 1.25rem;
            margin-right: 1rem;
            width: 24px;
            text-align: center;
        }

        .icon-company { color: #38bdf8; }
        .icon-academy { color: #a78bfa; }

        .ext-link i.icon-arrow {
            margin-left: auto;
            font-size: 0.85rem;
            color: #475569;
            transition: transform 0.25s ease;
        }

        .ext-link:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(56, 189, 248, 0.3);
            color: #ffffff;
        }

        .ext-link:hover i.icon-arrow {
            transform: translateX(4px);
            color: #38bdf8;
        }

        footer {
            text-align: center;
            color: #475569;
            font-size: 0.85rem;
            margin-top: 3rem;
            line-height: 1.5;
            width: 100%;
            z-index: 2;
            position: relative;
        }

        footer strong {
            color: #64748b;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 2rem 1.25rem; }
            .btn-cta { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="badge">
            <i class="fa-solid fa-circle"></i> Demo Landing Page
        </div>
        
        <h1>Pau Lomi</h1>
        <p class="status-info">Sistem masih dalam Pengembangan</p>
        
        <a href="https://s.id/chat-dlomy" class="btn-cta" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-whatsapp fa-xl"></i> Hubungi Saya
        </a>
        
        <div class="links-section">
            <p class="links-title">Kunjungi Juga Website</p>
            <div class="links-group">
                <a href="https://caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-building icon-left icon-company"></i>
                    <span>Caelum Gladio <small style="color:#64748b; display:block; font-size:0.75rem;">Company Profile</small></span>
                    <i class="fa-solid fa-chevron-right icon-arrow"></i>
                </a>
                
                <a href="https://akademi.caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    <i class="fa-solid fa-graduation-cap icon-left icon-academy"></i>
                    <span>CG Akademi <small style="color:#64748b; display:block; font-size:0.75rem;">Media Belajar Edukasi Resmi</small></span>
                    <i class="fa-solid fa-chevron-right icon-arrow"></i>
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; paulomi - 2026. Oleh <strong>Domy Lomy</strong></p>
    </footer>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const codeChars = "01<>[]{}/\\=+*htmlcssjavascriptpaulomicaelumgladio2026_";
        const charArray = codeChars.split("");

        const fontSize = 14;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100;
        }

        function drawBackground() {
            ctx.fillStyle = 'rgba(10, 15, 29, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#38bdf8';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawBackground, 33);
    </script>
</body>
</html>
