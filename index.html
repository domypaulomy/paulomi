<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Landing Page - Pau Lomi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            text-align: center;
            max-width: 600px;
            margin: auto;
        }

        .badge {
            background-color: #334155;
            color: #38bdf8;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid #475569;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-info {
            font-size: 1.125rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .btn-cta {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            margin-bottom: 3rem;
        }

        .btn-cta:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        .links-section {
            border-top: 1px solid #334155;
            padding-top: 2rem;
            width: 100%;
        }

        .links-title {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 1rem;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .ext-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
            display: inline-block;
        }

        .ext-link:hover {
            color: #38bdf8;
        }

        footer {
            text-align: center;
            color: #475569;
            font-size: 0.875rem;
            margin-top: 2rem;
            line-height: 1.5;
            width: 100%;
        }

        footer strong {
            color: #64748b;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .status-info { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Demo Landing Page</div>
        <h1>Pau Lomi</h1>
        <p class="status-info">Sistem masih dalam Pengembangan</p>
        
        <a href="https://s.id/chat-dlomy" class="btn-cta" target="_blank" rel="noopener noreferrer">
            Hubungi Saya
        </a>
        
        <div class="links-section">
            <p class="links-title">Kunjungi JugaWebsite</p>
            <div class="links-group">
                <a href="https://caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    Caelum Gladio
                </a>
                <a href="https://akademi.caelumgladio.com" class="ext-link" target="_blank" rel="noopener noreferrer">
                    CG Akademi
                </a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; paulomi - 2026. Oleh <strong>Domy Lomy</strong></p>
    </footer>

</body>
</html>
